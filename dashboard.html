<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra AI Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  color: #38bdf8;
}

.container {
  padding: 20px;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  flex: 1;
  min-width: 200px;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.card h3 {
  margin: 0 0 10px 0;
  color: #94a3b8;
}

.value {
  font-size: 22px;
  font-weight: bold;
}

.leaderboard {
  margin-top: 20px;
}

.player {
  padding: 10px;
  border-bottom: 1px solid #334155;
  display: flex;
  justify-content: space-between;
}

.player:hover {
  background: #334155;
}

.rank {
  color: #facc15;
}

.footer {
  text-align: center;
  margin-top: 20px;
  color: #64748b;
}
</style>

</head>
<body>

<header>🔥 Ultra AI Dashboard</header>

<div class="container">

<div class="grid">

  <div class="card">
    <h3>👥 Users</h3>
    <div id="users" class="value">0</div>
  </div>

  <div class="card">
    <h3>📤 Submissions</h3>
    <div id="subs" class="value">0</div>
  </div>

  <div class="card">
    <h3>🎬 Processed</h3>
    <div id="processed" class="value">0</div>
  </div>

  <div class="card">
    <h3>🏆 Season</h3>
    <div id="season" class="value">Loading...</div>
  </div>

</div>

<div class="card leaderboard">
  <h2>🏆 Leaderboard</h2>
  <div id="leaderboard"></div>
</div>

<div class="footer">
Ultra AI Engine • Live Dashboard
</div>

</div>

<script>

async function loadDashboard() {
  try {
    const dash = await fetch('/api/dashboard').then(r => r.json());
    const lb = await fetch('/api/leaderboard').then(r => r.json());
    const season = await fetch('/api/season').then(r => r.json());

    document.getElementById('users').innerText = dash.users || 0;
    document.getElementById('subs').innerText = dash.submissions || 0;
    document.getElementById('processed').innerText = dash.stats?.totalProcessed || 0;

    document.getElementById('season').innerText =
      `Season ${season.season} (${season.daysLeft} days left)`;

    const lbDiv = document.getElementById('leaderboard');
    lbDiv.innerHTML = '';

    lb.forEach((user, index) => {
      const div = document.createElement('div');
      div.className = 'player';

      div.innerHTML = `
        <span class="rank">#${index + 1}</span>
        <span>${user.username}</span>
        <span>${user.mmr} MMR</span>
      `;

      lbDiv.appendChild(div);
    });

  } catch (err) {
    console.error('Dashboard load error:', err);
  }
}

loadDashboard();
setInterval(loadDashboard, 5000);

</script>

</body>
</html>
